<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f1a">
  <title>Sandy Hook Surf Forecast</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="surf.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-row header-top">
        <a href="menu.html" class="back-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
        </a>
        <h1>SURF FORECAST</h1>
      </div>
      <div class="header-row header-bottom">
        <span class="location">Sandy Hook, NJ</span>
        <div class="sun-times">
          <div class="sun-item">
            <span class="sun-icon">☀️</span>
            <span id="sunriseTime" class="sun-value">--</span>
          </div>
          <div class="sun-item">
            <span class="sun-icon">🌙</span>
            <span id="sunsetTime" class="sun-value">--</span>
          </div>
        </div>
        <div class="current-conditions">
          <span id="currentRating" class="rating rating-fair">FAIR</span>
        </div>
      </div>
    </header>

    <!-- Current Conditions -->
    <section class="current-section">
      <h2>Current Conditions</h2>
      <div class="wave-visual">
        <div class="visual-scene">
          <img src="SurferStanding.png" alt="Surfer" class="surfer-img" id="surferImg">
          <svg class="wave-svg" id="waveSvg" viewBox="0 0 150 120" preserveAspectRatio="xMinYMax meet">
            <g id="waveGroup" stroke="#d4c1a7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <!-- Main curl -->
              <path d="M5,115 Q15,110 30,95 Q50,70 70,45 Q90,25 110,15 Q125,10 135,15 Q145,22 145,38 Q143,58 125,78 Q100,102 65,112 Q35,118 5,118"/>
              <!-- Inner curl lines -->
              <path d="M55,75 Q75,50 95,35 Q115,22 130,28 Q138,38 132,55 Q120,78 90,95"/>
              <path d="M70,78 Q90,58 108,48 Q122,42 125,52 Q120,68 100,85"/>
              <path d="M85,82 Q100,68 112,62 Q118,65 112,78"/>
              <!-- Spray/foam -->
              <circle cx="115" cy="8" r="2.5" fill="#d4c1a7"/>
              <circle cx="105" cy="5" r="2" fill="#d4c1a7"/>
              <circle cx="122" cy="4" r="1.5" fill="#d4c1a7"/>
              <circle cx="98" cy="10" r="1.5" fill="#d4c1a7"/>
              <circle cx="125" cy="12" r="2" fill="#d4c1a7"/>
              <!-- Base line -->
              <path d="M0,118 L150,118"/>
            </g>
          </svg>
        </div>
        <div class="visual-stats">
          <div class="stat-primary">
            <span id="currentWaveHeight" class="stat-value">--</span>
            <span class="stat-unit">ft</span>
          </div>
          <div class="stat-secondary">
            <span id="currentPeriod" class="stat-period">--</span><span class="stat-label">s</span>
            <span class="stat-divider">·</span>
            <span id="currentSwellDir" class="stat-dir">--</span>
          </div>
          <div class="stat-wind">
            <span id="currentWind" class="stat-wind-val">--</span>
            <span class="stat-label">mph</span>
            <span id="currentWindDir" class="stat-wind-dir"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Hourly Breakdown (expandable) -->
    <section class="hourly-section" id="hourlySection" onclick="toggleHourlyExpand(event)">
      <div class="hourly-header">
        <h2>Hourly Breakdown</h2>
        <span class="expand-hint">Tap to expand</span>
      </div>
      <button class="close-btn" id="closeBtn" onclick="closeHourlyExpand(event)">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
        </svg>
      </button>
      <div id="hourlyList" class="hourly-list">
        <div class="loading">Loading forecast...</div>
      </div>
    </section>

    <!-- Hourly Forecast Chart -->
    <section class="chart-section">
      <h2>48-Hour Forecast</h2>
      <div class="chart-container">
        <canvas id="forecastChart"></canvas>
      </div>
    </section>

    <!-- Conditions Guide -->
    <section class="guide-section">
      <h2>Sandy Hook Surf Guide</h2>
      <div class="guide-content">
        <div class="guide-item">
          <span class="guide-label">Best Swell</span>
          <span class="guide-value">E, ESE, SE</span>
        </div>
        <div class="guide-item">
          <span class="guide-label">Best Wind</span>
          <span class="guide-value">W, NW (offshore)</span>
        </div>
        <div class="guide-item">
          <span class="guide-label">Ideal Height</span>
          <span class="guide-value">3-6 ft</span>
        </div>
        <div class="guide-item">
          <span class="guide-label">Ideal Period</span>
          <span class="guide-value">8+ seconds</span>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script src="surf.js"></script>
</body>
</html>
