<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f1a">
  <title>Sandy Hook Surf Forecast</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="surf.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-row header-top">
        <a href="menu.html" class="back-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
        </a>
        <h1>SURF FORECAST</h1>
      </div>
      <div class="header-row header-bottom">
        <span class="location">Sandy Hook, NJ</span>
        <div class="sun-times">
          <div class="sun-item">
            <span class="sun-icon">☀️</span>
            <span id="sunriseTime" class="sun-value">--</span>
          </div>
          <div class="sun-item">
            <span class="sun-icon">🌙</span>
            <span id="sunsetTime" class="sun-value">--</span>
          </div>
        </div>
        <div class="current-conditions">
          <span id="currentRating" class="rating rating-fair">FAIR</span>
        </div>
      </div>
    </header>

    <!-- Current Conditions -->
    <section class="current-section">
      <div class="condition-cards">
        <div class="condition-card">
          <span class="card-label">WAVES</span>
          <span id="currentWaveHeight" class="card-value">--</span>
          <span class="card-unit">ft</span>
        </div>
        <div class="condition-card">
          <span class="card-label">PERIOD</span>
          <span id="currentPeriod" class="card-value">--</span>
          <span class="card-unit">sec</span>
        </div>
        <div class="condition-card">
          <span class="card-label">SWELL</span>
          <span id="currentSwellDir" class="card-value">--</span>
          <span class="card-unit"></span>
        </div>
        <div class="condition-card">
          <span class="card-label">WIND</span>
          <span id="currentWind" class="card-value">--</span>
          <span class="card-unit">mph</span>
        </div>
      </div>
    </section>

    <!-- Hourly Breakdown (expandable) -->
    <section class="hourly-section" id="hourlySection" onclick="toggleHourlyExpand(event)">
      <div class="hourly-header">
        <h2>Hourly Breakdown</h2>
        <span class="expand-hint">Tap to expand</span>
      </div>
      <button class="close-btn" id="closeBtn" onclick="closeHourlyExpand(event)">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
        </svg>
      </button>
      <div id="hourlyList" class="hourly-list">
        <div class="loading">Loading forecast...</div>
      </div>
    </section>

    <!-- Hourly Forecast Chart -->
    <section class="chart-section">
      <h2>48-Hour Forecast</h2>
      <div class="chart-container">
        <canvas id="forecastChart"></canvas>
      </div>
    </section>

    <!-- Conditions Guide -->
    <section class="guide-section">
      <h2>Sandy Hook Surf Guide</h2>
      <div class="guide-content">
        <div class="guide-item">
          <span class="guide-label">Best Swell</span>
          <span class="guide-value">E, ESE, SE</span>
        </div>
        <div class="guide-item">
          <span class="guide-label">Best Wind</span>
          <span class="guide-value">W, NW (offshore)</span>
        </div>
        <div class="guide-item">
          <span class="guide-label">Ideal Height</span>
          <span class="guide-value">3-6 ft</span>
        </div>
        <div class="guide-item">
          <span class="guide-label">Ideal Period</span>
          <span class="guide-value">8+ seconds</span>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script src="surf.js"></script>
</body>
</html>
